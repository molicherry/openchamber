name: Publish opencodeUI to Docker Hub

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to Docker Hub
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: dockerhub-opencodeui-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/opencodeui

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          REF="${{ github.ref }}"
          case "$REF" in
            *FULL*) echo "file=./Dockerfile" >> $GITHUB_OUTPUT ;;
            *)      echo "file=./Dockerfile.runtime" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set up Bun
        if: steps.dockerfile.outputs.file == './Dockerfile'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Build web assets (FULL image)
        if: steps.dockerfile.outputs.file == './Dockerfile'
        run: bun install --ignore-scripts && bun run build:web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract full image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag

      - name: Extract web image metadata
        id: meta-web
        if: github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-web
          tags: |
            type=ref,event=tag

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish full image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and publish web image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print published tags
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
        run: |
          echo "Full image: $IMAGE_NAME"
          echo "${{ steps.meta.outputs.tags }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo ""
            echo "Web image: $IMAGE_NAME"
            echo "${{ steps.meta-web.outputs.tags }}"
          fi
