name: Publish opencodeUI to GHCR

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to GHCR
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: ghcr-opencodeui-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencodeui

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          REF="${{ github.ref }}"
          case "$REF" in
            *FULL*) echo "file=./Dockerfile" >> $GITHUB_OUTPUT ;;
            *)      echo "file=./Dockerfile.runtime" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set up Bun
        if: steps.dockerfile.outputs.file == './Dockerfile'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Build web assets (FULL image)
        if: steps.dockerfile.outputs.file == './Dockerfile'
        run: bun install --ignore-scripts && bun run build:web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print published tags
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
        run: |
          echo "Image: $IMAGE_NAME"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
